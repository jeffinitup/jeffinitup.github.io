<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Projects</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/gallery.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
</head>
<body>

<header id="navbar-container">
    <script src="template/navbar.js"></script>
</header>

<main>
    <div id="gallery-view">
        <div id="project-grid" class="grid"></div>
    </div>

    <div id="detail-view" class="hidden">
        <div class="project-header">

            <div class="project-info">
                <h2 id="detail-title" class="detail-title"></h2>
                <div class="project-meta">
                    <span id="detail-date"></span>
                    <div id="detail-tag"></div>
                </div>
            </div>

            <a class="link-button back" onclick="showGallery()">← Back</a>

        </div>

        <div id="detail-media"></div>
        <div id="detail-links" class="detail-links"></div>
        <div id="detail-description"></div>
    </div>
</main>

<div id="fullscreen-modal" class="modal hidden" onclick="closeFullscreen()">
    <span class="close-btn">&times;</span>
    <button class="carousel-btn prev modal-btn" id="fs-prev-button">&#10094;</button>
    <img id="fs-media" src="" alt="Fullscreen Preview">
    <button class="carousel-btn next modal-btn" id="fs-next-button">&#10095;</button>
    <p id="fullscreen-alt-text" class="bordered-label"></p>
</div>

<script src="/gallery/gallery.js"></script>

<header id="footer-container">
    <script src="template/footer.js"></script>
</header>

</body>
</html>
